<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>登录成功</title>
</head>
<body>
<h1>登录成功</h1>
<p>用户名：<span th:text="${username}">-</span></p>
<p>OIDC 用户信息（attributes）：</p>
<pre th:text="${attributes}">-</pre>
<p>Access Token（JWT）：</p>
<pre th:text="${accessToken}">-</pre>
<p>资源服务 GET /userinfo 响应：</p>
<pre th:text="${userinfoJson}">-</pre>
<p><a th:href="@{/logout}">退出</a></p>
</body>
</html>
