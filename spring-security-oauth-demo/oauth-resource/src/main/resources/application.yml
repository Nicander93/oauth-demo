server:
  # 资源服务器端口
  port: 8090
  address: 0.0.0.0
spring:
  application:
    name: oauth-resource
  security:
    oauth2:
      resourceserver:
        jwt:
          # 用授权服务器发行者地址自动发现 JWK，用于验签 JWT
          issuer-uri: http://localhost:9000

logging:
  level:
    org.springframework.security: DEBUG
