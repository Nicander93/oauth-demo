<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DemoAuth 统一登录门户</title>
    <style>
        body { font-family: sans-serif; max-width: 560px; margin: 60px auto; line-height: 1.6; }
        .app-list { list-style: none; padding: 0; }
        .app-list li { margin: 12px 0; }
        a.btn { display: inline-block; padding: 10px 20px; background: #2563eb; color: #fff; text-decoration: none; border-radius: 4px; }
        .hint { font-size: 13px; color: #666; margin-top: 24px; padding-top: 16px; border-top: 1px solid #eee; }
        form { display: inline; margin-top: 20px; }
        button { padding: 8px 16px; cursor: pointer; }
    </style>
</head>
<body>
<h2>DemoAuth 统一登录门户</h2>
<p>当前用户：<strong th:text="${user.username}"></strong>（<span th:text="${user.nickname}"></span>）</p>
<p>选择要进入的业务系统：</p>
<ul class="app-list">
    <li th:each="app : ${apps}">
        <a class="btn" th:href="${app.loginUrl}" th:text="'进入' + ${app.name}"></a>
    </li>
</ul>
<form method="post" action="/logout">
    <button type="submit">退出统一认证（全局登出）</button>
</form>
<div class="hint">
    SSO 说明：你已在认证中心登录。进入各业务系统时将跳过密码页，由子系统根据 OAuth 的 sub 绑定本地用户。
    系统 B 中 bob 需手动绑定本地账号 bob_local。各业务系统的「退出登录」仅清除本地 Session。
</div>
</body>
</html>
